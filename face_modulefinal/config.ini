; face_module configuration
; ─────────────────────────────────────────────────────────────
; This file holds credentials — keep the whole face_module folder
; OUTSIDE htdocs (it already is) and out of any public share.

[api]
; If the module runs on the same PC as XAMPP:
base_url = http://localhost/citizen/api/v1
; If it runs on the gate workstation, use the server's LAN IP:
; base_url = http://192.168.1.10/citizen/api/v1
email    = face-gate@system.local
password = CHANGE_ME
timeout  = 8

[gate]
; gate_id from the `gate` table this camera watches
gate_id   = 1
; optional: sensor_id from the `sensor` table (controls IN/OUT behavior);
; leave blank for BIDIRECTIONAL entry/exit toggling
sensor_id =

[camera]
; 0 or 1 = webcam index, or an RTSP URL for the CCTV camera:
; source = rtsp://user:pass@192.168.1.50:554/stream1
source = 1

[recognition]
sim_threshold      = 0.40
confirm_frames     = 3
unknown_frames     = 12
cooldown_min       = 3
alarm_cooldown_sec = 60
process_every      = 3
; how often (minutes) to re-fetch embeddings so new enrollments
; appear without restarting the gate
refresh_minutes    = 5
